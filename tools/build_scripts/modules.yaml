groups:
  # common测试
  common_test:
    description: "common测试"
    modules: ["px4_bridge", "px4_web_api_demo", "px4_web_ui_demo"]
  # control测试
  control_test:
    description: "control测试"
    modules: ["uav_control"]
  # localization 测试
  localization_test:
    description: "localization 测试"
    modules: ["ekf_odometry","fast_lio","sunray_mocap","sunray_viobot"]
  # planner测试
